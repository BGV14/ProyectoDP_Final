# ==========================================================
# 1. Required Core Metadata
# ==========================================================
# Unique key used to identify this project inside SonarQube/SonarCloud
sonar.projectKey=u23223049

# The friendly project name displayed in the web UI
sonar.projectName=Mi proyecto Evelyn

# Version of the project being analyzed
sonar.projectVersion=1.0.0

# ==========================================================
# 2. Server Connection (Optional if configured globally in CI)
# ==========================================================
# The server URL of your SonarQube instance or SonarCloud
sonar.host.url=https://localhost:9000
# For SonarCloud, specify your organization key
sonar.token=squ_1a61e6e7061f379843a796da1336377e9ec8b183

# ==========================================================
# 3. Code Analysis Scope
# ==========================================================
# Paths to the source directories relative to this file (comma-separated)
sonar.sources=src,lib

# Paths to the test files or directories (comma-separated)
sonar.tests=src/__tests__,test

# Character encoding of the source files
sonar.sourceEncoding=UTF-8

# ==========================================================
# 4. File Exclusions and Inclusions
# ==========================================================
# Files/folders excluded from both bugs/vulnerabilities analysis
sonar.exclusions=node_modules/**,dist/**,build/**,coverage/**,**/*.config.js

# Files/folders excluded ONLY from code coverage metrics
sonar.coverage.exclusions=src/main.ts,src/mocks/**

# Only these files in the test directory will be recognized as actual tests
sonar.test.inclusions=**/*.test.ts,**/*.spec.ts

# ==========================================================
# 5. Test Reports & Coverage Execution
# ==========================================================
# Path to your test execution results (e.g., Generic test data, JUnit)
sonar.testExecutionReportPaths=coverage/test-reporter.xml

# Path to language-specific coverage files (e.g., LCOV for JS/TS)
sonar.javascript.lcov.reportPaths=coverage/lcov.info
